<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — Prostar</title>
<link rel="stylesheet" href="/assets/prostar-base.css">
</head>
<body>

<div class="auth-shell">
  <div class="wordmark"><span class="dot"></span>Prostar</div>

  <div class="card">
    <h1>Reset your password</h1>
    <p class="sub">Enter your email and we'll send a code to verify it's you.</p>

    <div id="error-slot"></div>

    <form id="forgot-form">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" autofocus>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Send reset code</button>
    </form>
  </div>

  <p class="footer-note"><a href="#" id="back-link" style="color:inherit;text-decoration:none;">&larr; Back to log in</a></p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/prostar-client.js"></script>
<script>
  const form = document.getElementById('forgot-form');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submit-btn');
  const errorSlot = document.getElementById('error-slot');

  const params = new URLSearchParams(window.location.search);
  document.getElementById('back-link').href = '/auth/login.html?' + params.toString();

  const prefillEmail = params.get('email');
  if (prefillEmail) emailInput.value = prefillEmail;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorSlot.innerHTML = '';
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Sending code...';

    const { error } = await prostarSendPasswordResetCode(email);

    if (error) {
      errorSlot.innerHTML = `<div class="error-msg">${error.message || 'Something went wrong. Try again.'}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reset code';
      return;
    }

    const p = new URLSearchParams();
    p.set('email', email);
    window.location.href = '/auth/reset-password.html?' + p.toString();
  });
</script>

</body>
</html>
