<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set a password — Prostar</title>
<link rel="icon" href="/assets/img/prostar-logo.png">
<link rel="stylesheet" href="/assets/prostar-base.css">
</head>
<body>

<div class="auth-shell">
  <div class="wordmark"><img src="/assets/img/prostar-logo.png" alt="">Prostar</div>

  <div class="card">
    <h1>Set a password</h1>
    <p class="sub">Your email is verified. Now set a password for your Prostar account. You'll still use a one-time code to log in day-to-day — this password is a backup credential for your account.</p>

    <div id="error-slot"></div>

    <form id="password-form">
      <div class="field">
        <label for="password">New password</label>
        <input type="text" id="password" placeholder="At least 8 characters" required autocomplete="new-password" autofocus style="font-family: var(--font-mono);" minlength="8">
      </div>
      <div class="field">
        <label for="password-confirm">Confirm password</label>
        <input type="text" id="password-confirm" placeholder="Re-enter your password" required autocomplete="new-password" style="font-family: var(--font-mono);" minlength="8">
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">
        Finish creating account
      </button>
    </form>
  </div>

  <p class="footer-note">Your account is protected either way — this just adds a backup option.</p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/prostar-client.js"></script>
<script>
  const form = document.getElementById('password-form');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('password-confirm');
  const submitBtn = document.getElementById('submit-btn');
  const errorSlot = document.getElementById('error-slot');

  function showError(msg) {
    errorSlot.innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  // Must already be verified/signed-in at this point (came from verify.html).
  // On a fresh page load right after verifyOtp, Supabase's client can take
  // a brief moment to finish persisting the new session to storage, so we
  // retry a couple of times before concluding there's really no session.
  (async function guard() {
    for (let attempt = 0; attempt < 5; attempt++) {
      const { data: { session } } = await prostarSupabase.auth.getSession();
      if (session) return; // session found, stay on this page
      await new Promise(r => setTimeout(r, 300));
    }
    // No session after retries — genuinely not logged in.
    window.location.href = '/index.html';
  })();

  function redirectAfterSetup() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('client_id') && params.get('redirect_uri')) {
      window.location.href = '/oauth/authorize.html?' + params.toString();
    } else {
      window.location.href = '/dashboard/index.html';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorSlot.innerHTML = '';

    const password = passwordInput.value;
    const confirm = confirmInput.value;

    if (password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }
    if (password !== confirm) {
      showError('Those passwords don\'t match. Try typing them again.');
      confirmInput.value = '';
      confirmInput.focus();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Saving...';

    const { error } = await prostarSupabase.auth.updateUser({ password });

    if (error) {
      showError(error.message || 'Could not set your password. Try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Finish creating account';
      return;
    }

    redirectAfterSetup();
  });
</script>

</body>
</html>
