<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Prostar</title>
<link rel="stylesheet" href="/assets/prostar-base.css">
</head>
<body>

<div class="auth-shell">
  <div class="wordmark"><span class="dot"></span>Prostar</div>

  <div class="card">
    <h1>Log in</h1>
    <p class="sub">Enter your email and we'll send you a one-time code to sign in.</p>

    <div id="error-slot"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" autofocus>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">
        Send code
      </button>
    </form>

    <p class="hint">
      Don't have a Prostar account? <a href="#" id="signup-link">Create one</a>
    </p>
  </div>

  <p class="footer-note"><a href="#" id="back-link" style="color:inherit;text-decoration:none;">&larr; Back</a></p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/prostar-client.js"></script>
<script>
  const form = document.getElementById('login-form');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submit-btn');
  const errorSlot = document.getElementById('error-slot');

  const params = new URLSearchParams(window.location.search);
  const qs = params.toString() ? '?' + params.toString() : '';
  document.getElementById('back-link').href = '/index.html' + qs;
  document.getElementById('signup-link').href = '/auth/signup.html' + qs;

  function showError(msg) {
    errorSlot.innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorSlot.innerHTML = '';
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Sending code...';

    // shouldCreateUser: false — this is the LOGIN path, not signup.
    // If no account exists for this email, we tell them to sign up
    // instead rather than silently creating one.
    const { error } = await prostarSupabase.auth.signInWithOtp({
      email,
      options: { shouldCreateUser: false }
    });

    if (error) {
      if (error.message && error.message.toLowerCase().includes('signup')) {
        showError('No Prostar account found for that email. <a href="/auth/signup.html' + qs.replace('?','&').replace('&','?') + '" style="color:var(--accent);">Create one instead</a>.');
      } else {
        showError(error.message || 'Something went wrong sending your code. Try again.');
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send code';
      return;
    }

    const verifyParams = new URLSearchParams(window.location.search);
    verifyParams.set('email', email);
    verifyParams.set('mode', 'login');
    window.location.href = '/auth/verify.html?' + verifyParams.toString();
  });
</script>

</body>
</html>
