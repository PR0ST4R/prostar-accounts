<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter reset code — Prostar</title>
<link rel="stylesheet" href="/assets/prostar-base.css">
</head>
<body>

<div class="auth-shell">
  <div class="wordmark"><span class="dot"></span>Prostar</div>

  <div class="card" id="code-card">
    <h1>Enter your code</h1>
    <p class="sub" id="sub-text">We sent a 6-digit code to your email.</p>

    <div id="code-error-slot"></div>

    <form id="code-form">
      <div class="field">
        <label for="otp">6-digit code</label>
        <input type="text" id="otp" class="otp-input" placeholder="••••••" inputmode="numeric" pattern="[0-9]*" maxlength="6" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" id="code-submit-btn">Verify code</button>
    </form>

    <p class="hint">Didn't get it? <a href="#" id="resend-link">Send a new code</a></p>
  </div>

  <div class="card" id="password-card" style="display:none;">
    <h1>Choose a new password</h1>
    <p class="sub">Your identity is verified. Set a new password below.</p>

    <div id="password-error-slot"></div>

    <form id="password-form">
      <div class="field">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" placeholder="At least 8 characters" required minlength="8" autofocus>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter your password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary" id="password-submit-btn">Save new password</button>
    </form>
  </div>

  <p class="footer-note"><a href="/auth/login.html" style="color:inherit;text-decoration:none;">&larr; Back to log in</a></p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/prostar-client.js"></script>
<script>
  const email = prostarQueryParam('email');
  if (!email) window.location.href = '/auth/forgot-password.html';

  document.getElementById('sub-text').textContent = `We sent a 6-digit code to ${email}.`;

  const codeCard = document.getElementById('code-card');
  const passwordCard = document.getElementById('password-card');
  const codeForm = document.getElementById('code-form');
  const codeErrorSlot = document.getElementById('code-error-slot');

  codeForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    codeErrorSlot.innerHTML = '';
    const code = document.getElementById('otp').value.trim();
    if (code.length !== 6) {
      codeErrorSlot.innerHTML = '<div class="error-msg">Enter the full 6-digit code.</div>';
      return;
    }

    const btn = document.getElementById('code-submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verifying...';

    const { data, error } = await prostarVerifyPasswordResetCode(email, code);

    if (error || !data.session) {
      codeErrorSlot.innerHTML = `<div class="error-msg">${error?.message || 'That code is invalid or expired.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Verify code';
      return;
    }

    codeCard.style.display = 'none';
    passwordCard.style.display = 'block';
  });

  document.getElementById('resend-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const link = e.target;
    link.textContent = 'Sending...';
    const { error } = await prostarSendPasswordResetCode(email);
    link.textContent = error ? 'Could not resend' : 'Code sent';
    setTimeout(() => { link.textContent = 'Send a new code'; }, 4000);
  });

  // ---- Set new password ----
  const passwordForm = document.getElementById('password-form');
  const passwordErrorSlot = document.getElementById('password-error-slot');

  passwordForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    passwordErrorSlot.innerHTML = '';
    const newPassword = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (newPassword.length < 8) {
      passwordErrorSlot.innerHTML = '<div class="error-msg">Password must be at least 8 characters.</div>';
      return;
    }
    if (newPassword !== confirm) {
      passwordErrorSlot.innerHTML = '<div class="error-msg">Those passwords don\'t match.</div>';
      return;
    }

    const btn = document.getElementById('password-submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';

    const { error } = await prostarSupabase.auth.updateUser({ password: newPassword });

    if (error) {
      passwordErrorSlot.innerHTML = `<div class="error-msg">${error.message || 'Could not update password.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Save new password';
      return;
    }

    window.location.href = '/dashboard/index.html';
  });
</script>

</body>
</html>
