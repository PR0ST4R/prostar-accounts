<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prostar</title>
<link rel="icon" href="/assets/img/prostar-logo.png">
<link rel="stylesheet" href="/assets/prostar-base.css">
</head>
<body>

<div class="auth-shell">
  <div class="wordmark"><img src="/assets/img/prostar-logo.png" alt="">Prostar</div>

  <div class="card">
    <h1>Welcome</h1>
    <p class="sub">Sign in to your Prostar account, or create a new one to get started.</p>

    <button class="btn btn-primary" id="login-btn" style="margin-bottom:12px;">
      Log in
    </button>
    <button class="btn btn-secondary" id="signup-btn">
      Create account
    </button>

    <div class="divider">or</div>

    <button class="btn btn-secondary" id="google-btn" disabled title="Coming soon">
      Continue with Google
    </button>

    <p class="hint" style="margin-top:20px;">
      Google sign-in is coming soon.
    </p>
  </div>

  <p class="footer-note">One Prostar account signs you in everywhere it's supported.</p>
</div>

<script>
  // Preserve any OAuth params (client_id, redirect_uri, state, scope)
  // across the fork so the flow can resume /authorize afterward.
  const params = new URLSearchParams(window.location.search);
  const qs = params.toString() ? '?' + params.toString() : '';

  document.getElementById('login-btn').addEventListener('click', () => {
    window.location.href = '/auth/login.html' + qs;
  });

  document.getElementById('signup-btn').addEventListener('click', () => {
    window.location.href = '/auth/signup.html' + qs;
  });
</script>

</body>
</html>
